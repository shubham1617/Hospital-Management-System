spring:
   datasource:
    url: jdbc:mysql://localhost:3306/patient_management
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  Hikari:
    maximum-pool-size: 10
    minimum-idle: 1
    idle-timeout: 30000
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
      defer-datasource-initialization: true

logging:
  level:
    root : info
